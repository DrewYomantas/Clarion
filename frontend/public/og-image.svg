<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F6F0E4"/>
      <stop offset="100%" stop-color="#EDE5D0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Left accent bar -->
  <rect x="80" y="80" width="4" height="120" fill="#C4A96A" rx="2"/>

  <!-- Wordmark -->
  <text x="108" y="148" font-family="Georgia, 'Times New Roman', serif" font-size="80" font-weight="700" letter-spacing="-2" fill="#111827">CLARION</text>

  <!-- Divider -->
  <line x1="108" y1="176" x2="760" y2="176" stroke="#C4A96A" stroke-width="1.5" opacity="0.6"/>

  <!-- Tagline -->
  <text x="108" y="218" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#374151" letter-spacing="0.5">Partner-Ready Client Feedback Governance</text>
  <text x="108" y="258" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#374151" letter-spacing="0.5">for Law Firms</text>

  <!-- Descriptor line -->
  <text x="108" y="324" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#6B7280" letter-spacing="0.3">Upload feedback → governance brief → partner meeting</text>

  <!-- Bottom pill badges -->
  <rect x="108" y="395" width="170" height="38" rx="6" fill="white" stroke="#D1CABC" stroke-width="1"/>
  <text x="193" y="419" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151" text-anchor="middle" font-weight="600">Governance Briefs</text>

  <rect x="292" y="395" width="140" height="38" rx="6" fill="white" stroke="#D1CABC" stroke-width="1"/>
  <text x="362" y="419" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151" text-anchor="middle" font-weight="600">Signal Review</text>

  <rect x="446" y="395" width="148" height="38" rx="6" fill="white" stroke="#D1CABC" stroke-width="1"/>
  <text x="520" y="419" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151" text-anchor="middle" font-weight="600">Follow-Through</text>

  <rect x="608" y="395" width="148" height="38" rx="6" fill="white" stroke="#D1CABC" stroke-width="1"/>
  <text x="682" y="419" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151" text-anchor="middle" font-weight="600">Meeting Ready</text>

  <!-- URL -->
  <text x="108" y="520" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#9CA3AF" letter-spacing="0.5">law-firm-feedback-saas.onrender.com</text>

  <!-- Right decorative element: stacked lines evoking a document -->
  <rect x="980" y="180" width="140" height="6" rx="3" fill="#C4A96A" opacity="0.35"/>
  <rect x="980" y="200" width="100" height="6" rx="3" fill="#C4A96A" opacity="0.25"/>
  <rect x="980" y="220" width="120" height="6" rx="3" fill="#C4A96A" opacity="0.20"/>
  <rect x="980" y="248" width="140" height="6" rx="3" fill="#111827" opacity="0.08"/>
  <rect x="980" y="268" width="90" height="6" rx="3" fill="#111827" opacity="0.06"/>
  <rect x="980" y="288" width="110" height="6" rx="3" fill="#111827" opacity="0.06"/>
  <rect x="980" y="308" width="140" height="6" rx="3" fill="#111827" opacity="0.06"/>
  <rect x="980" y="328" width="80" height="6" rx="3" fill="#111827" opacity="0.05"/>
  <rect x="980" y="356" width="140" height="6" rx="3" fill="#111827" opacity="0.05"/>
  <rect x="980" y="376" width="115" height="6" rx="3" fill="#111827" opacity="0.05"/>
  <!-- document border -->
  <rect x="960" y="156" width="180" height="260" rx="6" fill="none" stroke="#C4A96A" stroke-width="1.5" opacity="0.3"/>
</svg>
